<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  header{background:#1c1c1e;color:#fff;padding:16px 14px;text-align:center;position:sticky;top:0;z-index:10}

  .wrap{max-width:520px;margin:0 auto;padding:14px}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tabs button{flex:1;padding:10px;border:none;border-radius:10px;background:#e5e5ea;color:#3a3a3c;font-size:15px;font-weight:600}
  .tabs button.on{background:#1c1c1e;color:#fff}
  .card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .stats{display:flex;gap:10px;margin-bottom:6px}
  .stat{flex:1;background:#fff;border-radius:14px;padding:14px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .stat .n{font-size:26px;font-weight:700}
  .stat .l{font-size:12px;color:#8e8e93;margin-top:3px}
  .stat.done .n{color:#34c759}.stat.miss .n{color:#ff9500}
  .substat{text-align:center;font-size:12px;color:#8e8e93;margin-bottom:14px}
  .substat b{color:#5856d6}
  label.fld{display:block;font-size:13px;color:#8e8e93;margin-bottom:6px}
  #serial{width:100%;font-size:34px;text-align:center;padding:16px;border:2px solid #d1d1d6;border-radius:12px;font-weight:700;letter-spacing:3px}
  #serial:focus{outline:none;border-color:#1c1c1e}
  .minput{width:100%;font-size:16px;padding:11px;border:1px solid #d1d1d6;border-radius:10px;margin-bottom:10px}
  .minput:focus{outline:none;border-color:#5856d6}
  .btn{width:100%;margin-top:6px;padding:16px;font-size:18px;font-weight:700;color:#fff;background:#34c759;border:none;border-radius:12px}
  .btn.add{background:#5856d6;font-size:16px;padding:14px}
  .btn:active{opacity:.85}
  #result{margin-top:14px;min-height:20px;text-align:center;font-size:15px}
  #mresult{margin-top:4px;min-height:16px;text-align:center;font-size:14px}
  .ok{color:#1c7c33}.warn{color:#c77700}.err{color:#c0392b}
  .r-store{font-size:22px;font-weight:700;margin:2px 0}
  .r-biz{font-size:14px;color:#636366}
  h3{font-size:14px;color:#8e8e93;margin:4px 0 10px;font-weight:600}
  .collap-h{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .collap-h .arw{color:#c7c7cc;font-size:13px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px 6px;text-align:left;border-bottom:1px solid #f0f0f2}
  th{color:#8e8e93;font-weight:600}
  .muted{color:#aeaeb2;text-align:center;padding:16px 0}
  .row-btn{display:flex;gap:8px;margin-bottom:12px}

<body>
<header><h1>VOKA 即刻燙 LIVE  SEMINAR｜報到系統</h1></header>
<div class="region-bar">
  <label>場次</label>
  <select id="region"></select>
</div>
<div class="wrap">
  <div class="tabs">
    <button id="tabCheck" class="on" onclick="showTab('check')">✅ 報到</button>
    <button id="tabList" onclick="showTab('list')">📋 名單</button>
    <button id="tabStat" onclick="showTab('stat')">📊 統計</button>
  </div>

  <div id="viewCheck">
    <div class="stats">
      <div class="stat done"><div class="n" id="sDone">0</div><div class="l">到場</div></div>
      <div class="stat"><div class="n" id="sTotal">0</div><div class="l">名單應到</div></div>
      <div class="stat miss"><div class="n" id="sMiss">0</div><div class="l">未到</div></div>
    </div>
    <div class="substat" id="subStat"></div>
    <div class="card">
      <label class="fld">輸入票券序號後按報到（或按 Enter）</label>
      <input id="serial" inputmode="numeric" autocomplete="off" placeholder="票號">
      <button class="btn" onclick="doCheck()">報到 ✔</button>
      <div id="result"></div>
    </div>
    <div class="card">
      <div class="collap-h" onclick="toggleAdd()">
        <h3 style="margin:0">➕ 手動新增名單（貴賓／臨時／事前補名單）</h3>
        <span class="arw" id="addArw">展開 ▾</span>
      </div>
      <div id="addBody" class="hidden" style="margin-top:12px">
        <label class="fld">店家／姓名（必填）</label>
        <input class="minput" id="mStore" autocomplete="off" placeholder="例：○○沙龍　或　貴賓姓名">
        <label class="fld">業務（選填）</label>
        <input class="minput" id="mBiz" autocomplete="off" placeholder="約訪業務">
        <label class="fld">票號（純新增名單必填；現場臨時無票可留空）</label>
        <input class="minput" id="mNo" inputmode="numeric" autocomplete="off" placeholder="例：821">
        <button class="btn add" onclick="addEntry(false)">純新增名單（事前，未報到）</button>
        <button class="btn" style="background:#34c759;margin-top:10px" onclick="addEntry(true)">新增並報到（現場）</button>
        <div id="mresult"></div>
      </div>
    </div>
    <div class="card">
      <h3>最近報到</h3>
      <div id="recent"><div class="muted">尚無記錄</div></div>
    </div>
  </div>

  <div id="viewList" class="hidden">
    <div class="card">
      <input class="minput" id="listSearch" autocomplete="off" placeholder="🔍 搜尋票號／店家／業務" oninput="renderList()" style="margin-bottom:10px">
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;color:#3a3a3c">
        <input type="checkbox" id="onlyMiss" onchange="renderList()" style="width:18px;height:18px"> 只看未到
      </label>
      <div id="listCount" class="substat" style="margin-top:10px;margin-bottom:0"></div>
      <div id="listBody" style="margin-top:10px"></div>
    </div>
  </div>

  <div id="viewStat" class="hidden">
    <div class="row-btn">
      <button onclick="exportCSV()">↓ 匯出 CSV</button>
      <button onclick="clearRegion()">清除本場記錄</button>
    </div>
    <div class="card">
      <h3>各店家到場</h3>
      <div id="byStore"><div class="muted">尚無報到記錄</div></div>
    </div>
    <div class="card">
      <h3>詳細流水帳</h3>
      <div id="log"><div class="muted">尚無記錄</div></div>
    </div>
  </div>
</div>

const REGIONS=Object.keys(ROSTER);
const KEY=r=>"checkin_"+r;
let region=localStorage.getItem("lastRegion")||REGIONS[0];
if(!REGIONS.includes(region))region=REGIONS[0];

const selEl=document.getElementById("region");
REGIONS.forEach(r=>{const o=document.createElement("option");o.value=r;o.textContent=r+"（"+Object.keys(ROSTER[r]).length+" 人）";selEl.appendChild(o);});
selEl.value=region;
selEl.onchange=()=>{region=selEl.value;localStorage.setItem("lastRegion",region);document.getElementById("result").textContent="";document.getElementById("mresult").textContent="";render();};

function load(){try{return JSON.parse(localStorage.getItem(KEY(region)))||{}}catch(e){return{}}}
function save(o){localStorage.setItem(KEY(region),JSON.stringify(o))}
const ADDKEY=r=>"rosteradd_"+r;
function loadAdd(){try{return JSON.parse(localStorage.getItem(ADDKEY(region)))||{}}catch(e){return{}}}
function saveAdd(o){localStorage.setItem(ADDKEY(region),JSON.stringify(o))}
function getRoster(){return Object.assign({},ROSTER[region],loadAdd());}

function showTab(t){
  document.getElementById("viewCheck").classList.toggle("hidden",t!=="check");
  document.getElementById("viewList").classList.toggle("hidden",t!=="list");
  document.getElementById("viewStat").classList.toggle("hidden",t!=="stat");
  document.getElementById("tabCheck").classList.toggle("on",t==="check");
  document.getElementById("tabList").classList.toggle("on",t==="list");
  document.getElementById("tabStat").classList.toggle("on",t==="stat");
  if(t==="stat")renderStat();
  if(t==="list")renderList();
}
function toggleAdd(){
  const b=document.getElementById("addBody");const on=b.classList.toggle("hidden");
  document.getElementById("addArw").textContent=on?"展開 ▾":"收合 ▴";
  if(!on)document.getElementById("mStore").focus();
}

function doCheck(){
  const inp=document.getElementById("serial");
  const no=(inp.value||"").trim();
  const res=document.getElementById("result");
  if(!no){res.innerHTML='<span class="err">請輸入票號</span>';return;}
  const rec=getRoster()[no];
  if(!rec){res.innerHTML='<span class="err">✗ 查無此票號（'+no+'）— 不在'+region+'名單</span>';inp.value="";inp.focus();return;}
  const done=load();
  if(done[no]){
    res.innerHTML='<span class="warn">⚠ 票號 '+no+' 已報到過</span><br><span class="r-store">'+rec.s+'</span><br><span class="r-biz">'+(rec.b||"")+' ・ '+fmt(done[no].t)+'</span>';
    inp.value="";inp.focus();return;
  }
  done[no]={t:Date.now(),s:rec.s,b:rec.b};
  save(done);
  res.innerHTML='<span class="ok">✓ 報到成功</span><br><span class="r-store">'+rec.s+'</span><br><span class="r-biz">'+(rec.b||"")+'　票號 '+no+'</span>';
  inp.value="";inp.focus();
  render();
}
document.getElementById("serial").addEventListener("keydown",e=>{if(e.key==="Enter")doCheck();});

function addEntry(checkin){
  const store=(document.getElementById("mStore").value||"").trim();
  const biz=(document.getElementById("mBiz").value||"").trim();
  const no=(document.getElementById("mNo").value||"").trim();
  const res=document.getElementById("mresult");
  if(!store){res.innerHTML='<span class="err">請填店家／姓名</span>';return;}
  const done=load(),add=loadAdd();
  if(no){
    const inOrig=!!ROSTER[region][no];
    if(!inOrig){add[no]={s:store,b:biz};saveAdd(add);}
    else if(!checkin){res.innerHTML='<span class="err">票號 '+no+' 已在名單中</span>';return;}
    if(checkin){
      if(done[no]){res.innerHTML='<span class="warn">票號 '+no+' 已報到過</span>';}
      else{done[no]={t:Date.now(),s:store,b:biz};save(done);res.innerHTML='<span class="ok">✓ 已新增並報到：'+no+' '+store+'</span>';}
    }else{
      res.innerHTML='<span class="ok">✓ 已加入'+region+'名單（未報到）：'+no+' '+store+'</span>';
    }
  }else{
    if(!checkin){res.innerHTML='<span class="err">純新增名單需填票號（現場無票才可留空）</span>';return;}
    const key="W"+Date.now();
    done[key]={t:Date.now(),s:store,b:biz,w:true,no:"臨時"};save(done);
    res.innerHTML='<span class="ok">✓ 已新增並報到（臨時無票）：'+store+'</span>';
  }
  document.getElementById("mStore").value="";document.getElementById("mBiz").value="";document.getElementById("mNo").value="";
  document.getElementById("mStore").focus();
  render();
}
function removeAdded(no){
  if(!confirm("確定從"+region+"名單移除票號 "+no+"？")){return;}
  const add=loadAdd();delete add[no];saveAdd(add);
  const done=load();if(done[no]){delete done[no];save(done);}
  render();renderList();
}

function fmt(t){const d=new Date(t);const p=n=>String(n).padStart(2,"0");return p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());}
function fmtFull(t){const d=new Date(t);const p=n=>String(n).padStart(2,"0");return (d.getMonth()+1)+"/"+d.getDate()+" "+p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());}
function entries(){const done=load();return Object.entries(done).map(([k,v])=>({key:k,no:v.no||k,...v})).sort((a,b)=>b.t-a.t);}

function render(){
  const R=getRoster();
  const total=Object.keys(R).length;
  const arr=entries();
  const rosterDone=arr.filter(r=>R[r.key]).length;
  const walk=arr.filter(r=>!R[r.key]).length;
  document.getElementById("sTotal").textContent=total;
  document.getElementById("sDone").textContent=arr.length;
  document.getElementById("sMiss").textContent=total-rosterDone;
  document.getElementById("subStat").innerHTML=walk?('其中名單報到 '+rosterDone+' 位，臨時(無票) <b>'+walk+'</b> 位'):('名單報到 '+rosterDone+' 位');
  const rc=document.getElementById("recent");
  if(!arr.length){rc.innerHTML='<div class="muted">尚無記錄</div>';return;}
  let h='<table><tr><th>時間</th><th>票號</th><th>店家</th><th></th></tr>';
  arr.slice(0,12).forEach(r=>{h+='<tr><td>'+fmt(r.t)+'</td><td>'+r.no+(r.w?'<span class="tag">臨時</span>':'')+'</td><td>'+r.s+'</td><td><span class="undo" onclick="undo(\''+r.key+'\')">取消</span></td></tr>';});
  h+='</table>';rc.innerHTML=h;
  if(!document.getElementById("viewList").classList.contains("hidden"))renderList();
}
function undo(key){const done=load();if(done[key]){delete done[key];save(done);document.getElementById("result").innerHTML='<span class="warn">已取消 '+(done[key]?'':'')+'一筆報到</span>';render();}}

function renderList(){
  const done=load(),add=loadAdd(),R=getRoster();
  const q=(document.getElementById("listSearch").value||"").trim().toLowerCase();
  const onlyMiss=document.getElementById("onlyMiss").checked;
  const entries=Object.entries(R).map(([no,r])=>({no,s:r.s,b:r.b,in:!!done[no],added:!!add[no]}));
  entries.sort((a,b)=>(parseInt(a.no)||0)-(parseInt(b.no)||0));
  const doneN=entries.filter(e=>e.in).length;
  let rows=entries;
  if(onlyMiss)rows=rows.filter(e=>!e.in);
  if(q)rows=rows.filter(e=>(e.no+" "+(e.s||"")+" "+(e.b||"")).toLowerCase().includes(q));
  document.getElementById("listCount").innerHTML="名單共 "+entries.length+" 位，已到 <b style='color:#34c759'>"+doneN+"</b>，未到 <b style='color:#ff9500'>"+(entries.length-doneN)+"</b>";
  const el=document.getElementById("listBody");
  if(!rows.length){el.innerHTML='<div class="muted">查無符合的名單</div>';return;}
  let h='<table><tr><th>票號</th><th>店家</th><th>業務</th><th>狀態</th><th></th></tr>';
  rows.forEach(e=>{h+='<tr><td>'+e.no+(e.added?'<span class="tag">新增</span>':'')+'</td><td>'+e.s+'</td><td>'+(e.b||"")+'</td><td>'+(e.in?'<span style="color:#34c759;font-weight:600">✓ 到</span>':'<span style="color:#c7c7cc">未到</span>')+'</td><td>'+(e.added?'<span class="undo" style="color:#c0392b" onclick="removeAdded(\''+e.no+'\')">刪</span>':'')+'</td></tr>';});
  h+='</table>';el.innerHTML=h;
}

function renderStat(){
  const arr=entries();
  const bs={};arr.forEach(r=>{const k=r.s+(r.w?' ⟨臨時⟩':'');bs[k]=(bs[k]||0)+1});
  const bsEl=document.getElementById("byStore");
  const keys=Object.keys(bs).sort((a,b)=>bs[b]-bs[a]);
  if(!keys.length){bsEl.innerHTML='<div class="muted">尚無報到記錄</div>';}
  else{let h='<table><tr><th>店家</th><th>到場</th></tr>';keys.forEach(k=>{h+='<tr><td>'+k+'</td><td>'+bs[k]+'</td></tr>';});h+='</table>';bsEl.innerHTML=h;}
  const lg=document.getElementById("log");
  if(!arr.length){lg.innerHTML='<div class="muted">尚無記錄</div>';}
  else{let h='<table><tr><th>#</th><th>時間</th><th>票號</th><th>店家</th><th>業務</th></tr>';
    arr.forEach((r,i)=>{h+='<tr><td>'+(arr.length-i)+'</td><td>'+fmtFull(r.t)+'</td><td>'+r.no+(r.w?'<span class="tag">臨時</span>':'')+'</td><td>'+r.s+'</td><td>'+(r.b||"")+'</td></tr>';});
    h+='</table>';lg.innerHTML=h;}
}

function exportCSV(){
  const arr=entries().sort((a,b)=>a.t-b.t);
  let csv="﻿區域,票號,店家,業務,類型,報到時間\n";
  arr.forEach(r=>{csv+=[region,r.no,'"'+(r.s||"")+'"','"'+(r.b||"")+'"',(r.w?"臨時":"名單"),fmtFull(r.t)].join(",")+"\n";});
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="報到記錄_"+region+".csv";a.click();
}
function clearRegion(){if(confirm("確定清除「"+region+"」全部報到記錄（含臨時新增）？此動作無法復原。")){localStorage.removeItem(KEY(region));render();renderStat();document.getElementById("result").textContent="";}}

render();
</script>
</body>
</html>
